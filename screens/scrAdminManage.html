<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PowerApps – scrAdminManage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;

      display: flex;
      flex-direction: column;
      align-items: center;

      min-height: 100vh;
      gap: 20px;
    }
    h1 { font-size: 1.4rem; font-weight: 400; color: #a0a0c0; }
    .name { font-size: 1.1rem; font-weight: 600; color: #c8b8ff; }
    button {
      padding: 14px 36px;
      font-size: 1.1rem;
      background: #7c4dff;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:active { background: #5830cc; }
    #status {
      font-size: 0.9rem;
      color: #888;
      min-height: 1.2em;
      transition: color 0.2s;
    }
    #status.ok { color: #4caf7d; }
    #status.err { color: #e85555; }
    .info {
      font-size: 0.8rem;
      color: #555;
      margin-top: 8px;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>PowerApps Screen</h1>
  <div class="name">scrAdminManage</div>
  <button onclick="copyYAML()">Copy YAML to Clipboard</button>
  <div id="status">Click to copy — PowerApps-ready (CRLF, UTF-8)</div>
  <div class="info">
    After copying, open PowerApps Studio &rarr; select a screen &rarr; Ctrl+V<br>
    or use the paste button in the tree view.
  </div>
  <script>
    const yaml = "Screens:\r\n  scrAdminManage:\r\n    Properties:\r\n      Fill: =RGBA(247,249,252,1)\r\n      OnVisible: |-\r\n        =If(!varIsAdmin, Navigate(scrMyTraining, ScreenTransition.None));\r\n        If(IsBlank(varTab), Set(varTab, \"People\"));\r\n        ClearCollect(colCourses, 'TT Courses')\r\n    Children:\r\n      - recAdminManageHeader:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            BorderColor: =ColorFade(Self.Fill, -15%)\r\n            BorderThickness: =0\r\n            Color: =RGBA(255, 255, 255, 1)\r\n            DisabledBorderColor: =RGBA(166, 166, 166, 1)\r\n            DisplayMode: =DisplayMode.View\r\n            Fill: =RGBA(24,95,165,1)\r\n            Font: =Font.'Open Sans'\r\n            Height: =72\r\n            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)\r\n            HoverColor: =RGBA(255, 255, 255, 1)\r\n            HoverFill: =RGBA(24,95,165,1)\r\n            PressedBorderColor: =Self.Fill\r\n            PressedColor: =Self.Fill\r\n            PressedFill: =RGBA(24,95,165,1)\r\n            RadiusBottomLeft: =0\r\n            RadiusBottomRight: =0\r\n            RadiusTopLeft: =0\r\n            RadiusTopRight: =0\r\n            Text: =\r\n            Width: =1366\r\n            X: =0\r\n            Y: =0\r\n      - icoAdminManageBack:\r\n          Control: Classic/Icon@2.5.0\r\n          Properties:\r\n            BorderColor: =RGBA(0, 18, 107, 1)\r\n            Color: =RGBA(230,241,251,1)\r\n            Height: =24\r\n            Icon: =Icon.ChevronLeft\r\n            OnSelect: =Navigate(scrAdminDash, ScreenTransition.Fade)\r\n            Width: =24\r\n            X: =16\r\n            Y: =24\r\n      - lblManageTitle:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            BorderColor: =RGBA(0, 18, 107, 1)\r\n            BorderThickness: =0\r\n            Color: =RGBA(230,241,251,1)\r\n            Fill: =RGBA(0,0,0,0)\r\n            Font: =Font.'Open Sans'\r\n            FontWeight: =FontWeight.Bold\r\n            Height: =72\r\n            Size: =17\r\n            Text: =\"Manage\"\r\n            VerticalAlign: =VerticalAlign.Middle\r\n            Width: =600\r\n            X: =52\r\n            Y: =0\r\n      - btnTabPeople:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            BasePaletteColor: =If(varTab=\"People\",RGBA(24,95,165,1),RGBA(244,246,248,1))\r\n            Color: =If(varTab=\"People\",RGBA(255,255,255,1),RGBA(85,85,85,1))\r\n            Height: =40\r\n            OnSelect: =Set(varTab,\"People\")\r\n            Size: =12\r\n            Text: =\"People\"\r\n            Width: =120\r\n            X: =16\r\n            Y: =88\r\n      - btnTabCourses:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            BasePaletteColor: =If(varTab=\"Courses\",RGBA(24,95,165,1),RGBA(244,246,248,1))\r\n            Color: =If(varTab=\"Courses\",RGBA(255,255,255,1),RGBA(85,85,85,1))\r\n            Height: =40\r\n            OnSelect: =Set(varTab,\"Courses\")\r\n            Size: =12\r\n            Text: =\"Courses\"\r\n            Width: =120\r\n            X: =152\r\n            Y: =88\r\n      - recAddPanel:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            BorderColor: =RGBA(221,227,234,1)\r\n            BorderThickness: =1\r\n            Color: =RGBA(255, 255, 255, 1)\r\n            DisabledBorderColor: =RGBA(166, 166, 166, 1)\r\n            DisplayMode: =DisplayMode.View\r\n            Fill: =RGBA(255,255,255,1)\r\n            Font: =Font.'Open Sans'\r\n            Height: =340\r\n            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)\r\n            HoverColor: =RGBA(255, 255, 255, 1)\r\n            HoverFill: =RGBA(255,255,255,1)\r\n            PressedBorderColor: =Self.Fill\r\n            PressedColor: =Self.Fill\r\n            PressedFill: =RGBA(255,255,255,1)\r\n            RadiusBottomLeft: =8\r\n            RadiusBottomRight: =8\r\n            RadiusTopLeft: =8\r\n            RadiusTopRight: =8\r\n            Text: =\r\n            Visible: =varTab = \"People\"\r\n            Width: =640\r\n            X: =16\r\n            Y: =144\r\n      - lblAddTitle:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            BorderColor: =RGBA(0, 18, 107, 1)\r\n            BorderThickness: =0\r\n            Color: =RGBA(31,58,95,1)\r\n            Fill: =RGBA(0,0,0,0)\r\n            Font: =Font.'Open Sans'\r\n            FontWeight: =FontWeight.Bold\r\n            Height: =24\r\n            Size: =13\r\n            Text: =\"Add person\"\r\n            Visible: =varTab = \"People\"\r\n            Width: =400\r\n            X: =32\r\n            Y: =156\r\n      - cmbNewPerson:\r\n          Control: ModernCombobox@1.1.0\r\n          Properties:\r\n            Height: =40\r\n            InputTextPlaceholder: =\"Search M365 directory...\"\r\n            IsSearchable: =true\r\n            ItemDisplayText: =ThisItem.DisplayName\r\n            Items: |-\r\n              =Office365Users.SearchUserV2({searchTerm: cmbNewPerson.SearchText, top: 15}).value\r\n            SelectMultiple: =false\r\n            Size: =12\r\n            Visible: =varTab = \"People\"\r\n            Width: =590\r\n            X: =32\r\n            Y: =186\r\n      - lblOrManual:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Align: =Align.Center\r\n            BorderColor: =RGBA(0, 18, 107, 1)\r\n            BorderThickness: =0\r\n            Color: =RGBA(136,135,128,1)\r\n            Fill: =RGBA(0,0,0,0)\r\n            Font: =Font.'Open Sans'\r\n            Height: =20\r\n            Size: =10\r\n            Text: =\"or enter manually below\"\r\n            Visible: =varTab = \"People\"\r\n            Width: =590\r\n            X: =32\r\n            Y: =234\r\n      - txtManualEmail:\r\n          Control: ModernTextInput@1.1.0\r\n          Properties:\r\n            Height: =40\r\n            Placeholder: =\"Email address\"\r\n            Size: =12\r\n            Visible: =varTab = \"People\"\r\n            Width: =430\r\n            X: =32\r\n            Y: =258\r\n      - btnPullDetails:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            BasePaletteColor: =RGBA(244,246,248,1)\r\n            Color: =RGBA(24,95,165,1)\r\n            Height: =40\r\n            OnSelect: |-\r\n              =If(\r\n                  !IsBlank(txtManualEmail.Text),\r\n                  With(\r\n                      {profile: Office365Users.UserProfileV2(Trim(txtManualEmail.Text))},\r\n                      If(!IsBlank(profile.displayName),\r\n                          UpdateContext({locPulledName: profile.displayName});\r\n                          Notify(\"Details pulled from M365.\", NotificationType.Success),\r\n                          Notify(\"No M365 account found - fill in manually.\",\r\n                                 NotificationType.Warning)\r\n                      )\r\n                  ),\r\n                  Notify(\"Enter an email address first.\", NotificationType.Warning)\r\n              )\r\n            Size: =11\r\n            Text: =\"Pull details\"\r\n            Visible: =varTab = \"People\"\r\n            Width: =152\r\n            X: =470\r\n            Y: =258\r\n      - txtManualName:\r\n          Control: ModernTextInput@1.1.0\r\n          Properties:\r\n            Default: =locPulledName\r\n            Height: =40\r\n            Placeholder: =\"Display name\"\r\n            Size: =12\r\n            Visible: =varTab = \"People\"\r\n            Width: =590\r\n            X: =32\r\n            Y: =306\r\n      - drpNewType:\r\n          Control: ModernDropdown@1.0.1\r\n          Properties:\r\n            Height: =40\r\n            Items: =[\"Civil Servant\", \"Army\", \"Contractor\"]\r\n            Size: =12\r\n            Visible: =varTab = \"People\"\r\n            Width: =284\r\n            X: =32\r\n            Y: =354\r\n      - txtNewManager:\r\n          Control: ModernTextInput@1.1.0\r\n          Properties:\r\n            Height: =40\r\n            Placeholder: =\"Line manager email (optional)\"\r\n            Size: =11\r\n            Visible: =varTab = \"People\"\r\n            Width: =296\r\n            X: =326\r\n            Y: =354\r\n      - tglNewAdmin:\r\n          Control: Toggle@1.1.5\r\n          Properties:\r\n            Height: =32\r\n            Label: =\"Is admin\"\r\n            Visible: =varTab = \"People\"\r\n            Width: =160\r\n            X: =32\r\n            Y: =404\r\n      - tglHasM365:\r\n          Control: Toggle@1.1.5\r\n          Properties:\r\n            Checked: =true\r\n            Height: =32\r\n            Label: =\"Has M365 account\"\r\n            Visible: =varTab = \"People\"\r\n            Width: =200\r\n            X: =210\r\n            Y: =404\r\n      - btnAddPerson:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            BasePaletteColor: =RGBA(24,95,165,1)\r\n            Height: =44\r\n            OnSelect: |-\r\n              =With(\r\n                  {\r\n                      newEmail: Lower(If(!IsBlank(cmbNewPerson.Selected.Mail),\r\n                                         cmbNewPerson.Selected.Mail, Trim(txtManualEmail.Text))),\r\n                      newName:  If(!IsBlank(cmbNewPerson.Selected.DisplayName),\r\n                                   cmbNewPerson.Selected.DisplayName, Trim(txtManualName.Text)),\r\n                      newType:  drpNewType.Selected.Value,\r\n                      newHasM365: tglHasM365.Checked,\r\n                      newManager: Lower(Trim(txtNewManager.Text))\r\n                  },\r\n                  If(\r\n                      IsBlank(newEmail) || IsBlank(newName),\r\n                      Notify(\"Email and name are required.\", NotificationType.Warning),\r\n\r\n                      !IsBlank(LookUp('TT Personnel', Lower(Email) = newEmail)),\r\n                      Patch('TT Personnel',\r\n                          LookUp('TT Personnel', Lower(Email) = newEmail),\r\n                          {Active: true});\r\n                      Notify(\"Already in system - reactivated.\", NotificationType.Warning),\r\n\r\n                      Patch('TT Personnel', Defaults('TT Personnel'),\r\n                          {Title:newName, Email:newEmail, StaffType:{Value:newType},\r\n                           IsAdmin:tglNewAdmin.Checked, Active:true,\r\n                           HasM365Access:newHasM365, LineManagerEmail:newManager,\r\n                           ManagerCanEdit:false}\r\n                      );\r\n                      Notify(newName & \" added.\", NotificationType.Success);\r\n                      Reset(cmbNewPerson); Reset(txtManualEmail); Reset(txtManualName);\r\n                      Reset(drpNewType); Reset(tglNewAdmin); Reset(tglHasM365); Reset(txtNewManager)\r\n                  )\r\n              )\r\n            Size: =13\r\n            Text: =\"Add to system\"\r\n            Visible: =varTab = \"People\"\r\n            Width: =590\r\n            X: =32\r\n            Y: =444\r\n      - galPeople:\r\n          Control: Gallery@2.15.0\r\n          Variant: Vertical\r\n          Properties:\r\n            BorderColor: =RGBA(0, 18, 107, 1)\r\n            BorderThickness: =0\r\n            Fill: =RGBA(0,0,0,0)\r\n            Height: =624\r\n            Items: =SortByColumns(Filter('TT Personnel', Active = true), \"Title\", SortOrder.Ascending)\r\n            ShowScrollbar: =true\r\n            TemplatePadding: =0\r\n            TemplateSize: =60\r\n            Visible: =varTab = \"People\"\r\n            Width: =678\r\n            X: =672\r\n            Y: =144\r\n          Children:\r\n            - recPeopleRow:\r\n                Control: Classic/Button@2.2.0\r\n                Properties:\r\n                  BorderColor: =ColorFade(Self.Fill, -15%)\r\n                  BorderThickness: =0\r\n                  Color: =RGBA(255, 255, 255, 1)\r\n                  DisabledBorderColor: =RGBA(166, 166, 166, 1)\r\n                  DisplayMode: =DisplayMode.View\r\n                  Fill: =If(Mod(ThisItem.ID,2)=0,RGBA(255,255,255,1),RGBA(247,249,252,1))\r\n                  Font: =Font.'Open Sans'\r\n                  Height: =59\r\n                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)\r\n                  HoverColor: =RGBA(255, 255, 255, 1)\r\n                  HoverFill: =Self.Fill\r\n                  PressedBorderColor: =Self.Fill\r\n                  PressedColor: =Self.Fill\r\n                  PressedFill: =Self.Fill\r\n                  RadiusBottomLeft: =0\r\n                  RadiusBottomRight: =0\r\n                  RadiusTopLeft: =0\r\n                  RadiusTopRight: =0\r\n                  Text: =\r\n                  Width: =678\r\n                  X: =0\r\n                  Y: =0\r\n            - lblPersonName:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  BorderColor: =RGBA(0, 18, 107, 1)\r\n                  Color: =RGBA(31,58,95,1)\r\n                  Fill: =RGBA(0,0,0,0)\r\n                  Font: =Font.'Open Sans'\r\n                  FontWeight: =FontWeight.Semibold\r\n                  Height: =22\r\n                  Size: =13\r\n                  Text: =ThisItem.Title\r\n                  Width: =320\r\n                  X: =16\r\n                  Y: =8\r\n            - lblPersonEmail:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  BorderColor: =RGBA(0, 18, 107, 1)\r\n                  Color: =RGBA(136,135,128,1)\r\n                  Fill: =RGBA(0,0,0,0)\r\n                  Font: =Font.'Open Sans'\r\n                  Height: =16\r\n                  Size: =9\r\n                  Text: =ThisItem.Email\r\n                  Width: =320\r\n                  X: =16\r\n                  Y: =32\r\n            - drpRowType:\r\n                Control: ModernDropdown@1.0.1\r\n                Properties:\r\n                  Default: =ThisItem.StaffType.Value\r\n                  Height: =32\r\n                  Items: =[\"Civil Servant\",\"Army\",\"Contractor\"]\r\n                  OnChange: |-\r\n                    =Patch('TT Personnel', ThisItem,\r\n                        {StaffType: {Value: Self.Selected.Value}});\r\n                    Notify(ThisItem.Title & \" is now \" & Self.Selected.Value & \".\",\r\n                           NotificationType.Success)\r\n                  Size: =10\r\n                  Width: =170\r\n                  X: =346\r\n                  Y: =14\r\n            - lblAdminBadge:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  Align: =Align.Center\r\n                  BorderColor: =RGBA(0, 18, 107, 1)\r\n                  BorderThickness: =0\r\n                  Color: =RGBA(60,52,137,1)\r\n                  Fill: =RGBA(238,237,254,1)\r\n                  Font: =Font.'Open Sans'\r\n                  Height: =28\r\n                  Size: =9\r\n                  Text: =\"Admin\"\r\n                  Visible: =ThisItem.IsAdmin\r\n                  Width: =60\r\n                  X: =526\r\n                  Y: =16\r\n            - icoRemove:\r\n                Control: Classic/Icon@2.5.0\r\n                Properties:\r\n                  BorderColor: =RGBA(0, 18, 107, 1)\r\n                  Color: =If(varConfirmRemove=ThisItem.ID,RGBA(226,75,74,1),RGBA(170,187,204,1))\r\n                  Height: =24\r\n                  Icon: =Icon.Trash\r\n                  OnSelect: |-\r\n                    =If(\r\n                        varConfirmRemove = ThisItem.ID,\r\n                        Patch('TT Personnel', ThisItem, {Active: false});\r\n                        Set(varConfirmRemove, Blank());\r\n                        Notify(ThisItem.Title & \" deactivated. Records and certificates kept.\",\r\n                               NotificationType.Success),\r\n                        Set(varConfirmRemove, ThisItem.ID);\r\n                        Notify(\"Tap the bin again to confirm removing \" &\r\n                               ThisItem.Title & \".\", NotificationType.Warning)\r\n                    )\r\n                  Width: =24\r\n                  X: =600\r\n                  Y: =18\r\n      - recAddCoursePanel:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            BorderColor: =RGBA(221,227,234,1)\r\n            BorderThickness: =1\r\n            Color: =RGBA(255, 255, 255, 1)\r\n            DisabledBorderColor: =RGBA(166, 166, 166, 1)\r\n            DisplayMode: =DisplayMode.View\r\n            Fill: =RGBA(255,255,255,1)\r\n            Font: =Font.'Open Sans'\r\n            Height: =254\r\n            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)\r\n            HoverColor: =RGBA(255, 255, 255, 1)\r\n            HoverFill: =RGBA(255,255,255,1)\r\n            PressedBorderColor: =Self.Fill\r\n            PressedColor: =Self.Fill\r\n            PressedFill: =RGBA(255,255,255,1)\r\n            RadiusBottomLeft: =8\r\n            RadiusBottomRight: =8\r\n            RadiusTopLeft: =8\r\n            RadiusTopRight: =8\r\n            Text: =\r\n            Visible: =varTab = \"Courses\"\r\n            Width: =640\r\n            X: =16\r\n            Y: =144\r\n      - lblAddCourseTitle:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            BorderColor: =RGBA(0, 18, 107, 1)\r\n            BorderThickness: =0\r\n            Color: =RGBA(31,58,95,1)\r\n            Fill: =RGBA(0,0,0,0)\r\n            Font: =Font.'Open Sans'\r\n            FontWeight: =FontWeight.Bold\r\n            Height: =24\r\n            Size: =13\r\n            Text: =\"Add course\"\r\n            Visible: =varTab = \"Courses\"\r\n            Width: =400\r\n            X: =32\r\n            Y: =156\r\n      - txtNewCourse:\r\n          Control: ModernTextInput@1.1.0\r\n          Properties:\r\n            Height: =40\r\n            Placeholder: =\"Course name\"\r\n            Size: =12\r\n            Visible: =varTab = \"Courses\"\r\n            Width: =600\r\n            X: =32\r\n            Y: =186\r\n      - cmbNewApplic:\r\n          Control: ModernCombobox@1.1.0\r\n          Properties:\r\n            Height: =40\r\n            InputTextPlaceholder: =\"Applies to...\"\r\n            ItemDisplayText: =ThisItem.Value\r\n            Items: =[\"Civil Servant\", \"Army\", \"Contractor\"]\r\n            SelectMultiple: =true\r\n            Size: =12\r\n            Visible: =varTab = \"Courses\"\r\n            Width: =394\r\n            X: =32\r\n            Y: =234\r\n      - drpNewRecur:\r\n          Control: ModernDropdown@1.0.1\r\n          Properties:\r\n            Height: =40\r\n            ItemDisplayText: =ThisItem.Label\r\n            Items: |-\r\n              =Table(\r\n                  {Label: \"One-off (never expires)\", Months: 0},\r\n                  {Label: \"Every 6 months\",          Months: 6},\r\n                  {Label: \"Every year\",              Months: 12},\r\n                  {Label: \"Every 18 months\",         Months: 18},\r\n                  {Label: \"Every 2 years\",           Months: 24},\r\n                  {Label: \"Every 3 years\",           Months: 36}\r\n              )\r\n            Size: =12\r\n            Visible: =varTab = \"Courses\"\r\n            Width: =198\r\n            X: =434\r\n            Y: =234\r\n      - btnAddCourse:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            BasePaletteColor: =RGBA(24,95,165,1)\r\n            Height: =44\r\n            OnSelect: |-\r\n              =If(\r\n                  IsBlank(txtNewCourse.Text) || CountRows(cmbNewApplic.SelectedItems) = 0,\r\n                  Notify(\"Course needs a name and at least one staff type.\",\r\n                         NotificationType.Warning),\r\n                  Patch('TT Courses', Defaults('TT Courses'),\r\n                      {\r\n                          Title:            Trim(txtNewCourse.Text),\r\n                          ApplicableTo:     ForAll(cmbNewApplic.SelectedItems As T, {Value: T.Value}),\r\n                          RecurrenceMonths: drpNewRecur.Selected.Months,\r\n                          Status:           {Value: \"Active\"}\r\n                      }\r\n                  );\r\n                  Notify(\"Course added.\", NotificationType.Success);\r\n                  Reset(txtNewCourse); Reset(cmbNewApplic); Reset(drpNewRecur);\r\n                  ClearCollect(colCourses, 'TT Courses')\r\n              )\r\n            Size: =13\r\n            Text: =\"Add course\"\r\n            Visible: =varTab = \"Courses\"\r\n            Width: =600\r\n            X: =32\r\n            Y: =284\r\n      - recEditPanel:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            BorderColor: =RGBA(24,95,165,1)\r\n            BorderThickness: =2\r\n            Color: =RGBA(255, 255, 255, 1)\r\n            DisabledBorderColor: =RGBA(166, 166, 166, 1)\r\n            DisplayMode: =DisplayMode.View\r\n            Fill: =RGBA(255,255,255,1)\r\n            Font: =Font.'Open Sans'\r\n            Height: =286\r\n            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)\r\n            HoverColor: =RGBA(255, 255, 255, 1)\r\n            HoverFill: =RGBA(255,255,255,1)\r\n            PressedBorderColor: =Self.Fill\r\n            PressedColor: =Self.Fill\r\n            PressedFill: =RGBA(255,255,255,1)\r\n            RadiusBottomLeft: =8\r\n            RadiusBottomRight: =8\r\n            RadiusTopLeft: =8\r\n            RadiusTopRight: =8\r\n            Text: =\r\n            Visible: =varTab = \"Courses\" && !IsBlank(varEditCourse)\r\n            Width: =640\r\n            X: =16\r\n            Y: =144\r\n      - lblEditTitle:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            Bo n                  Set(varEditCourse, Blank());\r\n                  ClearCollect(colCourses, 'TT Courses');\r\n                  Notify(\"Course archived. Records and certificates kept forever.\", NotificationType.Success),\r\n                  Set(varConfirmArchive, varEditCourse.ID);\r\n                  Notify(\"Press Archive again to confirm.\", NotificationType.Warning)\r\n              )\r\n            Text: =\"Archive\"\r\n            Visible: =varTab = \"Courses\" && !IsBlank(varEditCourse)\r\n            Width: =144\r\n            X: =488\r\n            Y: =282\r\n      - galCourses:\r\n          Control: Gallery@2.15.0\r\n          Variant: Vertical\r\n          Properties:\r\n            BorderColor: =RGBA(0, 18, 107, 1)\r\n            BorderThickness: =0\r\n            Fill: =RGBA(0,0,0,0)\r\n            Height: =624\r\n            Items: =SortByColumns(colCourses, \"Status\", SortOrder.Descending, \"Title\", SortOrder.Ascending)\r\n            ShowScrollbar: =true\r\n            TemplatePadding: =0\r\n            TemplateSize: =64\r\n            Visible: =varTab = \"Courses\"\r\n            Width: =678\r\n            X: =672\r\n            Y: =144\r\n          Children:\r\n            - recCourseRow:\r\n                Control: Classic/Button@2.2.0\r\n                Properties:\r\n                  BorderColor: =ColorFade(Self.Fill, -15%)\r\n                  BorderThickness: =0\r\n                  Color: =RGBA(255, 255, 255, 1)\r\n                  DisabledBorderColor: =RGBA(166, 166, 166, 1)\r\n                  DisplayMode: =DisplayMode.View\r\n                  Fill: =If(ThisItem.Status.Value=\"Archived\",RGBA(248,248,248,1),If(Mod(ThisItem.ID,2)=0,RGBA(255,255,255,1),RGBA(247,249,252,1)))\r\n                  Font: =Font.'Open Sans'\r\n                  Height: =63\r\n                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)\r\n                  HoverColor: =RGBA(255, 255, 255, 1)\r\n                  HoverFill: =Self.Fill\r\n ll: =RGBA(241,239,232,1)\r\n                  Font: =Font.'Open Sans'\r\n                  Height: =26\r\n                  Size: =9\r\n                  Text: =\"Archived\"\r\n                  Visible: =ThisItem.Status.Value = \"Archived\"\r\n                  Width: =76\r\n                  X: =404\r\n                  Y: =18\r\n            - icoEditCourse:\r\n                Control: Classic/Icon@2.5.0\r\n                Properties:\r\n                  BorderColor: =RGBA(0, 18, 107, 1)\r\n                  Color: =RGBA(24,95,165,1)\r\n                  Height: =24\r\n                  Icon: =Icon.Edit\r\n                  OnSelect: =Set(varEditCourse,ThisItem)\r\n                  Visible: =ThisItem.Status.Value = \"Active\"\r\n                  Width: =24\r\n                  X: =500\r\n                  Y: =20\r\n            - icoArchiveCourse:\r\n                Control: Classic/Icon@2.5.0\r\n                Properties:\r\n                  BorderColor: =RGBA(0, 18, 107, 1)\r\n                  Color: =If(varConfirmArchive=ThisItem.ID,RGBA(226,75,74,1),RGBA(170,187,204,1))\r\n                  Height: =24\r\n                  Icon: =Icon.Trash\r\n                  OnSelect: |-\r\n                    =If(\r\n                        varConfirmArchive = ThisItem.ID,\r\n                        Patch('TT Courses', ThisItem, {Status: {Value: \"Archived\"}});\r\n                        Set(varConfirmArchive, Blank());\r\n                        ClearCollect(colCourses, 'TT Courses');\r\n                        Notify(\"Course archived. Records and certificates kept forever.\", NotificationType.Success),\r\n                        Set(varConfirmArchive, ThisItem.ID);\r\n                        Notify(\"Tap the bin again to confirm archiving \" & ThisItem.Title & \".\", NotificationType.Warning)\r\n                    )\r\n                  Visible: =ThisItem.Status.Value = \"Active\"\r\n                  Width: =24\r\n                  X: =534\r\n                  Y: =20\r\n            - icoRestoreCourse:\r\n                Control: Classic/Icon@2.5.0\r\n                Properties:\r\n                  BorderColor: =RGBA(0, 18, 107, 1)\r\n                  Color: =RGBA(24,95,165,1)\r\n                  Height: =24\r\n                  Icon: =Icon.Redo\r\n                  OnSelect: |-\r\n                    =Patch('TT Courses', ThisItem, {Status: {Value: \"Active\"}});\r\n                    ClearCollect(colCourses, 'TT Courses');\r\n                    Notify(\"Course restored to the mandatory list.\", NotificationType.Success)\r\n                  Visible: =ThisItem.Status.Value = \"Archived\"\r\n                  Width: =24\r\n                  X: =534\r\n                  Y: =20\r\n";

    async function copyYAML() {
      const status = document.getElementById('status');
      try {
        await navigator.clipboard.writeText(yaml);
        status.textContent = '✓ Copied! Paste into PowerApps Studio now.';
        status.className = 'ok';
        setTimeout(() => {
          status.textContent = 'Click to copy again';
          status.className = '';
        }, 4000);
      } catch (e) {
        status.textContent = 'Clipboard blocked — select the text below and copy manually.';
        status.className = 'err';
        const pre = document.createElement('pre');
        pre.style = 'font-size:9px;max-height:200px;overflow:auto;background:#1a1a2e;padding:8px;border-radius:6px;text-align:left;';
        pre.textContent = yaml;
        document.body.appendChild(pre);
      }
    }
  </script>
