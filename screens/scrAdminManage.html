<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Power Apps — scrAdminManage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 32px 16px; }
    .kicker { font-size: .78rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #64748b; }
    h1 { font-size: 1.8rem; font-weight: 700; color: #c7d2fe; letter-spacing: -.02em; }
    .meta { font-size: .85rem; color: #475569; }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    button { padding: 13px 32px; font-size: 1rem; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; transition: opacity .15s; }
    button:hover { opacity: .88; }
    .btn-copy { background: #4f46e5; color: #fff; }
    .btn-back { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    #status { font-size: .85rem; color: #475569; min-height: 1.2em; }
    #status.ok { color: #22c55e; }
    .instructions { max-width: 480px; text-align: center; font-size: .82rem; color: #475569; line-height: 1.7; border: 1px solid #1e293b; border-radius: 12px; padding: 16px 20px; background: #0d1117; }
    .instructions strong { color: #94a3b8; }
  </style>
</head>
<body>
  <p class="kicker">Power Apps · Training Tracker · Screen 7 of 7</p>
  <h1>scrAdminManage</h1>
  <p class="meta">v1.5 — StaffType dropdown fixed: Classic/DropDown, Default + local patch</p>
  <div class="btn-row">
    <button class="btn-copy" onclick="copyYAML()">Copy YAML to clipboard</button>
    <a href="../"><button class="btn-back" type="button">← Guide library</button></a>
  </div>
  <p id="status">Ready to copy</p>
  <div class="instructions">
    <strong>How to paste into Power Apps Studio</strong><br>
    Tree View → click screen → Ctrl+A → Delete → Ctrl+V.
  </div>
  <script>
const yaml = `Screens:
  scrAdminManage:

        =If(IsBlank(varTab), Set(varTab, "People"));

            Color: =RGBA(136,135,128,1)

      - txtManualEmail:
          Control: ModernTextInput@1.1.0

            Height: =40

            Size: =12
            Visible: =varTab = "People"
            Width: =430
            X: =32
            Y: =258
      - btnPullDetails:
          Control: ModernButton@1.0.0

            BasePaletteColor: =RGBA(46,110,145,1)
            Color: =RGBA(255, 255, 255, 1)
            Height: =40
            OnSelect: |-
              =If(
                  !IsBlank(txtManualEmail.Text),
                  With(
                      {profile: Office365Users.UserProfileV2(Trim(txtManualEmail.Text))},
                      If(!IsBlank(profile.displayName),
                          UpdateContext({locPulledName: profile.displayName});
                          Notify("Details pulled from M365.", NotificationType.Success),

                  Notify("Enter an email address first.", NotificationType.Warning)

            Y: =258
      - txtManualName:

      - drpNewType:

      - tglNewAdmin:

            Checked: =true
            Height: =32
            Label: ="Has M365 account"
            Visible: =varTab = "People"
            Width: =200
            X: =210
            Y: =404
      - btnAddPerson:
          Control: ModernButton@1.0.0
          Properties:
            BasePaletteColor: =RGBA(24,95,165,1)
            Height: =44
            OnSelect: |-
              =With(
                  {
                      newEmail: Lower(If(!IsBlank(cmbNewPerson.Selected.Mail),
                                         cmbNewPerson.Selected.Mail, Trim(txtManualEmail.Text))),
                      newName:  If(!IsBlank(cmbNewPerson.Selected.DisplayName),
                                   cmbNewPerson.Selected.DisplayName, Trim(txtManualName.Text)),
                      newType:  drpNewType.Selected.Value,
                      newHasM365: tglHasM365.Checked,
                      newManager: Lower(Trim(txtNewManager.Text))
                  },
                  If(
                      IsBlank(newEmail) || IsBlank(newName),
                      Notify("Email and name are required.", NotificationType.Warning),

                      !IsBlank(LookUp('TT Personnel', Lower(Email) = newEmail)),
                      Patch('TT Personnel',
                          LookUp('TT Personnel', Lower(Email) = newEmail),
                          {Active: true});
                      Notify("Already in system - reactivated.", NotificationType.Warning),

                      Patch('TT Personnel', Defaults('TT Personnel'),
                          {Title:newName, Email:newEmail, StaffType:{Value:newType},
                           IsAdmin:tglNewAdmin.Checked, Active:true,
                           HasM365Access:newHasM365, LineManagerEmail:newManager,
                           ManagerCanEdit:false}
                      );
                      Notify(newName & " added.", NotificationType.Success);
                      Reset(cmbNewPerson); Reset(txtManualEmail); Reset(txtManualName);
                      Reset(drpNewType); Reset(tglNewAdmin); Reset(tglHasM365); Reset(txtNewManager)
                  )
              )
            Size: =13
            Text: ="Add to system"
            Visible: =varTab = "People"
            Width: =590
            X: =32
            Y: =444
      - galPeople:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =RGBA(0,0,0,0)
            Height: =624
            Items: =SortByColumns(Filter('TT Personnel', Active = true), "Title", SortOrder.Ascending)
            TemplatePadding: =0
            TemplateSize: =60
            Visible: =varTab = "People"
            Width: =678
            X: =672
            Y: =144
          Children:
            - recPeopleRow:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =0
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  DisplayMode: =DisplayMode.View
                  Fill: =If(Mod(ThisItem.ID,2)=0,RGBA(255,255,255,1),RGBA(247,249,252,1))
                  Font: =Font.'Open Sans'
                  Height: =59
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =Self.Fill
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Fill
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Text: =
                  Width: =678
            - lblPersonName:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(31,58,95,1)
                  Fill: =RGBA(0,0,0,0)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: =22
                  Text: =ThisItem.Title
                  Width: =320
                  X: =16
                  Y: =8
            - lblPersonEmail:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(136,135,128,1)
                  Fill: =RGBA(0,0,0,0)
                  Font: =Font.'Open Sans'
                  Height: =16
                  Size: =9
                  Text: =ThisItem.Email
                  Width: =320
                  X: =16
                  Y: =32
            - drpRowType:
                Control: Classic/DropDown@2.3.2
                Properties:
                  Default: =ThisItem.StaffType.Value
                  Items: =["Civil Servant","Army","Contractor"]
                  OnChange: |-
                    =Patch('TT Personnel', ThisItem,
                        {StaffType: {Value: drpRowType.Selected.Value}});
                    Patch(colAllPeople, LookUp(colAllPeople, ID = ThisItem.ID),
                        {StaffType: {Value: drpRowType.Selected.Value}});
                    Notify(ThisItem.Title & " is now " & drpRowType.Selected.Value & ".",
                           NotificationType.Success)
                  Width: =170
                  X: =346
                  Y: =14
            - lblAdminBadge:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(60,52,137,1)
                  Fill: =RGBA(238,237,254,1)
                  Font: =Font.'Open Sans'
                  Height: =28
                  Size: =9
                  Text: ="Admin"
                  Visible: =ThisItem.IsAdmin
                  Width: =60
                  X: =526
                  Y: =16
            - icoRemove:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =If(varConfirmRemove=ThisItem.ID,RGBA(226,75,74,1),RGBA(170,187,204,1))
                  Height: =24
                  Icon: =Icon.Trash
                  OnSelect: |-
                    =If(
                        varConfirmRemove = ThisItem.ID,
                        Patch('TT Personnel', ThisItem, {Active: false});
                        Set(varConfirmRemove, Blank());
                        Notify(ThisItem.Title & " deactivated. Records and certificates kept.",
                               NotificationType.Success),
                        Set(varConfirmRemove, ThisItem.ID);
                        Notify("Tap the bin again to confirm removing " &
                               ThisItem.Title & ".", NotificationType.Warning)
                    )
                  Width: =24
                  X: =600
                  Y: =18
      - recAddCoursePanel:

            DisplayMode: =DisplayMode.View
            Fill: =RGBA(255,255,255,1)
            Font: =Font.'Open Sans'
            Height: =254
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =RGBA(255,255,255,1)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =RGBA(255,255,255,1)
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            Text: =
            Visible: =varTab = "Courses" && IsBlank(varEditCourse)
            Width: =640
            X: =16
            Y: =144
      - lblAddCourseTitle:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(31,58,95,1)
            Fill: =RGBA(0,0,0,0)

            Height: =24

            X: =32
            Y: =156
      - txtNewCourse:
          Control: ModernTextInput@1.1.0
          Properties:
            Height: =40
            Placeholder: ="Course name"
            Size: =12
            Visible: =varTab = "Courses" && IsBlank(varEditCourse)
            Width: =600
            X: =32
            Y: =186
      - cmbNewApplic:
          Control: ModernCombobox@1.1.0
          Properties:
            Height: =40
            InputTextPlaceholder: ="Applies to..."
            ItemDisplayText: =ThisItem.Value
            Items: =["Civil Servant", "Army", "Contractor"]
            Size: =12
            Visible: =varTab = "Courses" && IsBlank(varEditCourse)
            Width: =394
            X: =32
            Y: =234
      - drpNewRecur:
          Control: ModernDropdown@1.0.1
          Properties:
            Height: =40
            ItemDisplayText: =ThisItem.Label
            Items: |-
              =Table(
                  {Label: "One-off (never expires)", Months: 0},
                  {Label: "Every 6 months",          Months: 6},
                  {Label: "Every year",              Months: 12},
                  {Label: "Every 18 months",         Months: 18},
                  {Label: "Every 2 years",           Months: 24},

              )

            X: =434
            Y: =234

            BasePaletteColor: =RGBA(24,95,165,1)

            OnSelect: |-
              =If(
                  IsBlank(txtNewCourse.Text) || CountRows(cmbNewApplic.SelectedItems) = 0,

                         NotificationType.Warning),
                  Patch('TT Courses', Defaults('TT Courses'),
                      {
                          Title:            Trim(txtNewCourse.Text),
                          ApplicableTo:     ForAll(cmbNewApplic.SelectedItems As T, {Value: T.Value}),

                  Notify("Course added.", NotificationType.Success);
                  Reset(txtNewCourse); Reset(cmbNewApplic); Reset(drpNewRecur);
                  ClearCollect(colCourses, 'TT Courses')
              )
            Size: =13
            Text: ="Add course"
            Visible: =varTab = "Courses" && IsBlank(varEditCourse)

            X: =32
            Y: =284
      - recEditPanel:

            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisplayMode: =DisplayMode.View

            Font: =Font.'Open Sans'
            Height: =286
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =RGBA(255,255,255,1)
            PressedBorderColor: =Self.Fill

            PressedFill: =RGBA(255,255,255,1)

            Visible: =varTab = "Courses" && !IsBlank(varEditCourse)

            X: =16

            Fill: =RGBA(0,0,0,0)
            Font: =Font.'Open Sans'
            FontWeight: =FontWeight.Bold
            Height: =24
            Text: ="Edit course"
            Visible: =varTab = "Courses" && !IsBlank(varEditCourse)
            Width: =400
            X: =32
            Y: =156
      - txtEditCourse:
          Control: ModernTextInput@1.1.0
          Properties:
            Default: =varEditCourse.Title
            Height: =40
            Size: =12
            Visible: =varTab = "Courses" && !IsBlank(varEditCourse)
            Width: =600
            X: =32
            Y: =186
      - cmbEditApplic:
          Control: ModernCombobox@1.1.0
          Properties:
            DefaultSelectedItems: =varEditCourse.ApplicableTo
            Height: =40
            ItemDisplayText: =ThisItem.Value
            Items: =["Civil Servant","Army","Contractor"]
            Visible: =varTab = "Courses" && !IsBlank(varEditCourse)
            Width: =394
            X: =32
            Y: =234
      - drpEditRecur:
          Control: ModernDropdown@1.0.1
          Properties:
            Height: =40
            ItemDisplayText: =ThisItem.Label
            Items: |-
              =Table(
                  {Label: "One-off (never expires)", Months: 0},
                  {Label: "Every 6 months",          Months: 6},
                  {Label: "Every year",              Months: 12},
                  {Label: "Every 18 months",         Months: 18},
                  {Label: "Every 2 years",           Months: 24},
                  {Label: "Every 3 years",           Months: 36}
              )
            Size: =12
            Visible: =varTab = "Courses" && !IsBlank(varEditCourse)
            Width: =198
            X: =434
            Y: =234
      - btnSaveCourse:
          Control: ModernButton@1.0.0
          Properties:
            BasePaletteColor: =RGBA(24,95,165,1)
            Height: =44
            OnSelect: |-
              =Patch('TT Courses', varEditCourse,
                  {
                      Title:            Trim(txtEditCourse.Text),
                      ApplicableTo:     ForAll(cmbEditApplic.SelectedItems As T, {Value: T.Value}),
                      RecurrenceMonths: drpEditRecur.Selected.Months
                  }
              );
              Notify("Course updated. Expiry dates recalculate automatically.",
                     NotificationType.Success);
              ClearCollect(colCourses, 'TT Courses');
              Set(varEditCourse, Blank())
            Size: =13
            Text: ="Save changes"
            Visible: =varTab = "Courses" && !IsBlank(varEditCourse)
            Width: =290
            X: =32
            Y: =282
      - btnCancelEdit:
          Control: ModernButton@1.0.0
          Properties:
            BasePaletteColor: =RGBA(108,117,125,1)
            Color: =RGBA(255,255,255,1)
            Height: =44
            OnSelect: =Set(varEditCourse,Blank())
            Text: ="Cancel"
            Visible: =varTab = "Courses" && !IsBlank(varEditCourse)
            Width: =150
            X: =330
            Y: =282
      - btnArchive:
          Control: ModernButton@1.0.0
          Properties:
            BasePaletteColor: =RGBA(163,45,45,1)
            Color: =RGBA(255,255,255,1)
            Height: =44
            OnSelect: |-
              =If(
                  varConfirmArchive = varEditCourse.ID,
                  Patch('TT Courses', varEditCourse, {Status: {Value: "Archived"}});
                  Set(varConfirmArchive, Blank());
                  Set(varEditCourse, Blank());
                  ClearCollect(colCourses, 'TT Courses');
                  Notify("Course archived. Records and certificates kept forever.", NotificationType.Success),
                  Set(varConfirmArchive, varEditCourse.ID);
                  Notify("Press Archive again to confirm.", NotificationType.Warning)
              )
            Text: ="Archive"
            Visible: =varTab = "Courses" && !IsBlank(varEditCourse)
            Width: =144
            X: =488
            Y: =282
      - galCourses:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =RGBA(0,0,0,0)
            Height: =624
            Items: |-

function copyYAML() {
  const crlf = yaml.replace(/\r?\n/g, '\r\n');
  navigator.clipboard.writeText(crlf).then(() => {
    const s = document.getElementById('status');
    s.textContent = 'Copied!';
    s.className = 'ok';
    setTimeout(() => { s.textContent = 'Ready to copy'; s.className = ''; }, 3000);
  }).catch(() => {
    const s = document.getElementById('status');
    s.textContent = 'Copy failed.';
    s.className = 'err';
  });
}
