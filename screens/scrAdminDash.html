<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Power Apps — scrAdminDash</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 32px 16px; }
    .kicker { font-size: .78rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #64748b; }
    h1 { font-size: 1.8rem; font-weight: 700; color: #c7d2fe; letter-spacing: -.02em; }
    .meta { font-size: .85rem; color: #475569; }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    button { padding: 13px 32px; font-size: 1rem; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; transition: opacity .15s, transform .1s; }
    button:hover { opacity: .88; transform: translateY(-1px); }
    .btn-copy { background: #4f46e5; color: #fff; }
    .btn-back { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    #status { font-size: .85rem; color: #475569; min-height: 1.2em; }
    #status.ok { color: #22c55e; }
    #status.err { color: #ef4444; }
    .instructions { max-width: 480px; text-align: center; font-size: .82rem; color: #475569; line-height: 1.7; border: 1px solid #1e293b; border-radius: 12px; padding: 16px 20px; background: #0d1117; }
    .instructions strong { color: #94a3b8; }
  </style>
</head>
<body>
  <p class="kicker">Power Apps · Training Tracker · Screen 6 of 7</p>
  <h1>scrAdminDash</h1>
  <p class="meta">Diagnostic build — gallery Items = colCompliance (no filter/sort)</p>
  <div class="btn-row">
    <button class="btn-copy" onclick="copyYAML()">Copy YAML to clipboard</button>
    <a href="../"><button class="btn-back" type="button">← Guide library</button></a>
  </div>
  <p id="status">Ready to copy</p>
  <div class="instructions">
    <strong>How to paste into Power Apps Studio</strong><br>
    Open the app → Tree View → click the screen → Ctrl+A → Delete → Ctrl+V.
  </div>

    Properties:
      Fill: =RGBA(247,249,252,1)
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)

        =ClearCollect(colAllPeople, Filter('TT Personnel', Active = true));
        ClearCollect(colAllRecords, 'TT TrainingRecords');
        ClearCollect(colCourses, 'TT Courses');

            colCompliance,
            ForAll(
                colAllPeople As P,
                With(
                    {
                        req: Filter(
                            colCourses,
                            Status.Value = "Active" &&
                            P.StaffType.Value in ApplicableTo.Value
                        )
                    },
                    With(
                        {
                            okCount: CountRows(
                                Filter(
                                    req As C,
                                    With(
                                        {
                                            rec: LookUp(
                                                colAllRecords,
                                                Lower(PersonEmail) = Lower(P.Email) &&
                                                CourseID = C.ID
                                            )
                                        },
                                        !IsBlank(rec.DateCompleted) &&
                                        (
                                            C.RecurrenceMonths = 0 ||
                                            DateAdd(rec.DateCompleted, C.RecurrenceMonths, TimeUnit.Months) >= Today()
                                        )
                                    )
                                )
                            )
                        },
                        {
                            PersonID:      P.ID,
                            Name:          P.Title,
                            Email:         Lower(P.Email),
                            StaffType:     P.StaffType.Value,
                            LineManager:   P.LineManagerEmail,
                            ManagerEdit:   Coalesce(P.ManagerCanEdit, false),
                            Required:      CountRows(req),
                            InDate:        okCount,
                            Outstanding:   CountRows(req) - okCount,
                            CompliancePct: If(
                                               CountRows(req) = 0,

                                           )

                )
            )

function copyYAML() {
  const crlf = yaml.replace(/\r?\n/g, '\r\n');
  navigator.clipboard.writeText(crlf).then(() => {
    const s = document.getElementById('status');
    s.textContent = 'Copied!';
    s.className = 'ok';
    setTimeout(() => { s.textContent = 'Ready to copy'; s.className = ''; }, 3000);
  }).catch(() => {
    const s = document.getElementById('status');
    s.textContent = 'Copy failed.';
    s.className = 'err';
  });
}
